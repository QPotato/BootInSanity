# Lock X screen to 1280x720 for kiosk use.
# Real MK9 hardware will override via EDID; this is the QEMU-test default.

Section "Monitor"
    Identifier  "Monitor0"
    HorizSync   28-80
    VertRefresh 48-75
    Modeline    "1280x720" 74.5 1280 1336 1472 1664 720 721 724 746 -hsync +vsync
    Option      "PreferredMode" "1280x720"
EndSection

Section "Device"
    Identifier  "Device0"
    Driver      "modesetting"
EndSection

Section "Screen"
    Identifier  "Screen0"
    Device      "Device0"
    Monitor     "Monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1280x720"
    EndSubSection
EndSection
