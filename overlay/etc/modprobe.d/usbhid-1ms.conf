# Force 1 ms polling on all USB HID devices for low input latency.
# Patched usbhid.ko at /lib/modules/$KVER/updates/usbhid.ko adds the
# elsepoll parameter (covers non-mouse non-keyboard non-joystick devices
# like PIUIO/LXIO/ITGIO that XSanity reads).
options usbhid kbpoll=1 jspoll=1 mousepoll=1 elsepoll=1
