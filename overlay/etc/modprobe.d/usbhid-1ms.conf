# Force 1 ms polling on all USB HID devices for low input latency.
# Patched usbhid.ko adds elsepoll (non-mouse/kb/joystick devices).
options usbhid kbpoll=1 jspoll=1 mousepoll=1 elsepoll=1 \
        quirks=0x0547:0x1002:0x0004
# 0x0547:0x1002 = Andamiro PIUIO; 0x0004 = HID_QUIRK_IGNORE.
# Prevents usbhid from claiming PIUIO so piuio2key (libusb) can open it
# reliably without a race condition at boot.
